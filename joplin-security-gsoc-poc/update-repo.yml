# .github/workflows/update-repo.yml
# Proposed replacement for the current cron-based pipeline.
#
# Current system: single cron job, full write access, no human review
# This system: PR-based review, job separation, write access only where needed
#
# Security improvements over current workflow:
# - No global write permissions, each job defines its own
# - Plugin code only runs in build job (contents: read)
# - Write access only in commit job, never runs plugin code
# - CLI dependency pinned to exact version
# - Triggered by human action, not cron

name: Plugin Review Pipeline

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions: {}

jobs:
  # Runs when author comments "Review Plugin"
  # plugin-repo-cli handles: clone, Semgrep, socket.dev, AI report
  # Workflow handles: posting PR comment, adding labels
  scan:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, 'Review Plugin') &&
      (
        github.event.comment.user.login == github.event.issue.user.login ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER'
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout joplin/plugins repo
        uses: actions/checkout@v4
        with:
          ref: master
          path: plugins

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install plugin-repo-cli (pinned)
        run: |
          mkdir plugin-repo-builder && cd plugin-repo-builder
          npm install @joplin/plugin-repo-cli@3.6.0
          echo 'require("@joplin/plugin-repo-cli")' > main.js

      - name: Run scan
        run: |
          node plugin-repo-builder/main.js scan \
            --pr-number "${{ github.event.issue.number }}" \
            --plugins-dir "$(realpath ./plugins/)" \
            --output scan-results.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const results = JSON.parse(require('fs').readFileSync('scan-results.json'));
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: results.report,
            });
            if (!results.passed) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['scan-failed'],
              });
            }

  # Runs when PR is merged
  # plugin-repo-cli handles: clone, build, validate
  # Workflow handles: uploading artifact
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    permissions:
      contents: read
    outputs:
      plugin_id: ${{ steps.build.outputs.plugin_id }}
    steps:
      - name: Checkout joplin/plugins repo
        uses: actions/checkout@v4
        with:
          ref: master
          path: plugins

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install plugin-repo-cli (pinned)
        run: |
          mkdir plugin-repo-builder && cd plugin-repo-builder
          npm install @joplin/plugin-repo-cli@3.6.0
          echo 'require("@joplin/plugin-repo-cli")' > main.js

      - name: Build plugin from source
        id: build
        run: |
          node plugin-repo-builder/main.js build-from-source \
            --pr-number "${{ github.event.pull_request.number }}" \
            --plugins-dir "$(realpath ./plugins/)" \
            --output build-output.json
          echo "plugin_id=$(jq -r '.pluginId' build-output.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: build-output.json

  # Runs after build succeeds
  # plugin-repo-cli handles: copy .jpl, update manifests.json, commit, push
  # Workflow handles: downloading artifact, failure notification
  commit:
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Checkout joplin/plugins repo
        uses: actions/checkout@v4
        with:
          ref: master
          path: plugins

      - name: Prepare git identity
        run: |
          git config --global user.name "joplinbot"
          git config --global user.email "bot@joplinapp.org"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install plugin-repo-cli (pinned)
        run: |
          mkdir plugin-repo-builder && cd plugin-repo-builder
          npm install @joplin/plugin-repo-cli@3.6.0
          echo 'require("@joplin/plugin-repo-cli")' > main.js

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: plugin-artifact/

      - name: Commit plugin
        run: |
          node plugin-repo-builder/main.js commit-plugin \
            --artifact-dir "$(realpath ./plugin-artifact/)" \
            --plugins-dir "$(realpath ./plugins/)" \
            --plugin-id "${{ needs.build.outputs.plugin_id }}"
        env:
          JOPLIN_GITHUB_OAUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '❌ Build or commit failed after merge. A maintainer needs to investigate and re-trigger manually.',
            });
